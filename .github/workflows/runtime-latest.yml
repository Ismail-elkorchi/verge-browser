name: Runtime Latest (Non-blocking)

on:
  schedule:
    - cron: "11 4 * * 2"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runtime-latest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  latest-runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout html-parser dependency
        run: |
          set -euo pipefail
          if [ ! -d ../html-parser ]; then
            git clone --depth 1 https://github.com/Ismail-elkorchi/html-parser.git ../html-parser
          fi

      - name: Setup Node (latest stable)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: current
          cache: npm

      - name: Setup Deno (latest stable)
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: latest

      - name: Setup Bun (latest stable)
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Prepare html-parser dependency
        run: |
          set -euo pipefail
          cd ../html-parser
          npm ci
          npm run build

      - name: Install
        run: npm ci

      - name: Dependency freshness check
        run: npm run deps:freshness

      - name: Core checks
        run: npm run check

      - name: Runtime smoke matrix
        run: npm run smoke:all
